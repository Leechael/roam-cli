name: Release on Tag

on:
  push:
    tags:
      - "roam-cli-v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform artifacts
        run: |
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              out="dist/roam-cli-${os}-${arch}"
              GOOS=$os GOARCH=$arch go build -o "$out" ./cmd/roam-cli
              tar -czf "${out}.tar.gz" -C dist "$(basename "$out")"
              rm -f "$out"
            done
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)

      - name: Generate CHANGELOG.md
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag=$(git tag -l 'roam-cli-v*' --sort=-version:refname | grep -v "^${current_tag}$" | head -n 1 || true)

          {
            echo "# Changelog"
            echo
            echo "## ${current_tag}"
            echo
            if [ -n "${previous_tag}" ]; then
              echo "Changes since ${previous_tag}:"
              echo
              git log --pretty='- %s (%h)' "${previous_tag}..${current_tag}"
            else
              echo "Initial release changes:"
              echo
              git log --pretty='- %s (%h)' "${current_tag}"
            fi
          } > dist/CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/CHANGELOG.md
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/CHANGELOG.md
          prerelease: ${{ contains(github.ref_name, '-alpha.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.') }}
