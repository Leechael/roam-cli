name: Release Command

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options: [patch, minor, major]
      prerelease:
        description: "Prerelease tag"
        required: false
        type: choice
        options: ["", alpha, beta, rc]
      ref:
        description: "Branch/ref to release from"
        required: false
        default: main
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  parse:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '!release')
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.parse.outputs.should_release }}
      release_type: ${{ steps.parse.outputs.release_type }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
      ref: ${{ steps.parse.outputs.ref }}
      issue_number: ${{ steps.parse.outputs.issue_number }}
      requested_by: ${{ steps.parse.outputs.requested_by }}
    steps:
      - name: Parse release comment
        id: parse
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.comment.body.trim();
            const match = body.match(/!release\s+(patch|minor|major)(?:\s+(alpha|beta|rc))?/i);
            const issueNumber = context.payload.issue.number;
            const actor = context.payload.comment.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const safeComment = async (message) => {
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber, body: message
                });
              } catch (e) {
                core.warning(`Failed to post issue comment: ${e.message}`);
              }
            };

            if (!match) {
              await safeComment(`⚠️ @${actor} invalid command. Use: \`!release <patch|minor|major> [alpha|beta|rc]\``);
              return;
            }

            const assoc = context.payload.comment.author_association;
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            if (!allowed.includes(assoc)) {
              await safeComment(`⛔ @${actor} you are not allowed to trigger release.`);
              return;
            }

            if (!context.payload.issue.pull_request) {
              await safeComment(`⚠️ @${actor} release command only works in PR comments.`);
              return;
            }

            const releaseType = match[1].toLowerCase();
            const prerelease = (match[2] || '').toLowerCase();

            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: issueNumber
            });

            if (!pr.head.repo || pr.head.repo.full_name !== `${owner}/${repo}`) {
              await safeComment(`⛔ @${actor} release from fork PR is not supported.`);
              return;
            }

            await safeComment(`🚀 @${actor} accepted. Creating tag from branch \`${pr.head.ref}\` with bump \`${releaseType}\`${prerelease ? ` (${prerelease})` : ''}.`);

            core.setOutput('should_release', 'true');
            core.setOutput('release_type', releaseType);
            core.setOutput('prerelease', prerelease);
            core.setOutput('ref', pr.head.ref);
            core.setOutput('issue_number', String(issueNumber));
            core.setOutput('requested_by', actor);

  create-tag:
    needs: [parse]
    if: |
      always() && (
        (github.event_name == 'issue_comment' && needs.parse.outputs.should_release == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    concurrency:
      group: release-roam-cli
      cancel-in-progress: false
    env:
      RELEASE_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_type || needs.parse.outputs.release_type }}
      PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || needs.parse.outputs.prerelease }}
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || needs.parse.outputs.ref }}
      ISSUE_NUMBER: ${{ needs.parse.outputs.issue_number }}
      REQUESTED_BY: ${{ github.event_name == 'workflow_dispatch' && github.actor || needs.parse.outputs.requested_by }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          chmod +x ./scripts/next-version.sh
          version=$(./scripts/next-version.sh "$RELEASE_TYPE" "$PRERELEASE")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=roam-cli-v$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          tag='${{ steps.version.outputs.tag }}'
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 1
          fi
          git tag "$tag"
          git push origin "$tag"

      - name: Comment success
        if: success() && env.ISSUE_NUMBER != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              `✅ Release tag created: \`${{ steps.version.outputs.tag }}\``,
              `- Source ref: \`${process.env.SOURCE_REF}\``,
              `- Requested by: @${process.env.REQUESTED_BY}`,
              '',
              `Building release artifacts...`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body
            });

      - name: Comment failure
        if: failure() && env.ISSUE_NUMBER != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `❌ Failed to create release tag. Logs: ${runUrl}`
            });

  build-release:
    needs: [parse, create-tag]
    if: always() && needs.create-tag.result == 'success'
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ needs.parse.outputs.issue_number }}
      RELEASE_TAG: ${{ needs.create-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform artifacts
        run: |
          mkdir -p dist
          for os in darwin linux; do
            for arch in amd64 arm64; do
              artifact="dist/roam-cli-${os}-${arch}.tar.gz"
              tmpdir=$(mktemp -d)
              GOOS=$os GOARCH=$arch go build -o "$tmpdir/roam-cli" ./cmd/roam-cli
              tar -czf "$artifact" -C "$tmpdir" roam-cli
              rm -rf "$tmpdir"
            done
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)

      - name: Generate CHANGELOG.md
        run: |
          current_tag="${RELEASE_TAG}"
          previous_tag=$(git tag -l 'roam-cli-v*' --sort=-version:refname | grep -v "^${current_tag}$" | head -n 1 || true)

          {
            echo "# Changelog"
            echo
            echo "## ${current_tag}"
            echo
            if [ -n "${previous_tag}" ]; then
              echo "Changes since ${previous_tag}:"
              echo
              git log --pretty='- %s (%h)' "${previous_tag}..${current_tag}"
            else
              echo "Initial release changes:"
              echo
              git log --pretty='- %s (%h)' "${current_tag}"
            fi
          } > dist/CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: dist/CHANGELOG.md
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/CHANGELOG.md
          prerelease: ${{ contains(env.RELEASE_TAG, '-alpha.') || contains(env.RELEASE_TAG, '-beta.') || contains(env.RELEASE_TAG, '-rc.') }}

      - name: Comment release success
        if: success() && env.ISSUE_NUMBER != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `📦 GitHub Release created: https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${process.env.RELEASE_TAG}`
            });

      - name: Comment release failure
        if: failure() && env.ISSUE_NUMBER != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `❌ Failed to build release artifacts. Logs: ${runUrl}`
            });
