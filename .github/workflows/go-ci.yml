name: Go CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -buildvcs=false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download deps
        run: go mod tidy

      - name: Verify go.mod/go.sum unchanged
        run: |
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./tests)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Pre-commit checks (prek)
        if: ${{ hashFiles('prek.toml') != '' || hashFiles('.pre-commit-config.yaml') != '' || hashFiles('.pre-commit-config.yml') != '' }}
        run: |
          if ! command -v prek >/dev/null 2>&1; then
            echo "pre-commit config detected, but prek is not installed." >&2
            echo "Install prek in the runner image before enabling this gate." >&2
            exit 1
          fi
          prek validate-config
          prek run --all-files

      - name: Unit tests
        run: go test ./... -count=1

      - name: BDD tests
        run: go test -tags=bdd ./tests/bdd/... -count=1

      - name: Build
        run: go build -v ./cmd/roam-cli
